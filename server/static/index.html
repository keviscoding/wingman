<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wingman</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Wingman">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="stylesheet" href="/static/style.css?v=46">
</head>
<body>
  <div id="app">
    <header>
      <h1>WINGMAN</h1>
      <div class="header-right">
        <button type="button" class="theme-btn" id="notifyBtn" title="Tap to enable alerts when replies are ready"
          aria-label="Reply notifications">&#128276;</button>
        <button class="theme-btn" id="themeBtn" title="Toggle light/dark mode">&#9788;</button>
        <button class="reading-btn" id="readBtn" title="Start reading the chat on screen">
          <span id="readIcon">&#128065;</span>
          <span id="readLabel">Start Reading</span>
        </button>
      </div>
    </header>

    <div class="status-banner" id="statusBanner">
      <span id="statusText">Click "Start Reading" then scroll through a chat</span>
    </div>

    <!-- Training status -->
    <div class="training-bar" id="trainingBar">
      <span class="training-icon" id="trainingIcon">&#128218;</span>
      <span id="trainingLabel">Training: not loaded</span>
      <label class="upload-btn">
        Upload transcripts
        <input type="file" id="uploadInput" multiple accept=".txt,.md,.text,.csv,.json,.srt,.vtt" hidden>
      </label>
    </div>

    <!-- Input section (headless / mobile only) -->
    <div class="upload-section" id="uploadSection" style="display:none">
      <div class="upload-row">
        <input type="text" id="contactInput" class="contact-input"
               placeholder="Contact name (e.g. Evie)" autocomplete="off">
      </div>
      <div class="upload-row">
        <label class="screenshot-upload-btn" id="screenshotBtn">
          <span class="upload-icon">&#128247;</span>
          <span>Upload Screenshots</span>
          <input type="file" id="screenshotInput" multiple accept="image/*,video/*" hidden>
        </label>
      </div>
      <div class="upload-preview" id="uploadPreview"></div>
      <textarea id="extraContext" class="context-input"
                placeholder="Extra context... (e.g. 'we met at a party', 'she's been cold lately')"
                rows="2"></textarea>
      <button class="analyze-btn" id="analyzeBtn" disabled>
        <span id="analyzeBtnText">Select screenshots</span>
      </button>
    </div>

    <!-- Input bar: contact name + context -->
    <div class="reading-contact-bar" id="readingContactBar">
      <input type="text" id="readContactInput" class="contact-input"
             placeholder="Contact name (e.g. Evie)" autocomplete="off">
      <textarea id="readExtraContext" class="context-input"
                placeholder="Extra context (optional)"
                rows="1"></textarea>
    </div>

    <!-- Drop zone for screenshots -->
    <div class="drop-zone" id="dropZone">
      <div class="drop-zone-inner" id="dropZoneInner">
        <span class="drop-icon">&#128247;</span>
        <span class="drop-text">Drop screenshots or videos here, or <label class="drop-browse" for="dropFileInput">browse</label></span>
        <input type="file" id="dropFileInput" multiple accept="image/*,video/*" hidden>
      </div>
      <div class="drop-preview" id="dropPreview"></div>
      <button class="drop-analyze-btn hidden" id="dropAnalyzeBtn">Analyze</button>
    </div>

    <div class="main-layout">
      <aside class="contacts-sidebar" id="contactsSidebar">
        <div class="sidebar-header">
          <h3>Saved Chats</h3>
          <button class="new-chat-btn" id="newChatBtn" title="New chat">+ New</button>
        </div>
        <div class="contact-select-wrap">
          <select id="contactSelect" aria-label="Saved chats">
            <option value="">Chats…</option>
          </select>
        </div>
        <div id="contactsList" class="contacts-list">
          <p class="empty-small">No chats yet</p>
        </div>
      </aside>

      <div class="content">
        <div class="preview-small" id="previewSection">
          <img id="previewImg" src="/frame.jpg" alt="Screen">
        </div>

        <div class="contact-label" id="contactLabel"></div>

        <main id="results" class="results hidden">
          <section class="transcript-panel">
            <div class="transcript-header">
              <h2>Chat <span id="msgCount" class="count"></span></h2>
              <div class="add-dropdown" id="addDropdown">
                <button class="append-btn" id="addToggle">+ Add new</button>
                <div class="add-menu hidden" id="addMenu">
                  <button class="add-option" id="addReadScreen">&#128065; Read screen</button>
                  <label class="add-option" id="addScreenshot">
                    &#128247; Screenshot
                    <input type="file" id="addScreenshotInput" multiple accept="image/*,video/*" hidden>
                  </label>
                </div>
              </div>
            </div>
            <div id="transcript" class="transcript-scroll"></div>
          </section>
          <section class="replies-panel">
            <button type="button" class="analysis-toggle-btn" id="analysisToggleBtn">Show analysis</button>
            <div id="coachSection" class="coach-section hidden">
              <div class="coach-read" id="coachRead"></div>
              <div class="coach-advice" id="coachAdvice"></div>
            </div>
            <div class="presets-bar">
              <div class="preset-select-wrap">
              <select id="presetSelect">
                <option value="-1">No goal (default)</option>
              </select>
              </div>
              <button type="button" class="preset-add-btn" id="addPresetBtn" title="Save a new goal preset">+ New goal</button>
              <button type="button" class="preset-io-btn" id="exportPresetsBtn"
                title="Download wingman-bundle.json: goals, training transcripts, and saved chats">Export</button>
              <label class="preset-io-btn preset-io-label" title="Restore from wingman-bundle.json (or goals-only JSON)">
                Import
                <input type="file" id="importPresetsInput" accept=".json,application/json" hidden>
              </label>
            </div>
            <div class="extra-request-bar">
              <input type="text" id="extraRequestInput" class="extra-request-input"
                     placeholder="Extra request for next replies (optional)..." autocomplete="off">
            </div>
            <div class="replies-header">
              <h2>Replies</h2>
              <button class="regen-btn" id="regenBtn" title="Generate new replies">&#8635; New replies</button>
            </div>
            <div id="replies" class="replies-grid"></div>
          </section>
        </main>
      </div>
    </div>

    <div id="toast" class="toast">Copied!</div>
  </div>
  <script src="/static/app.js?v=55"></script>
</body>
</html>
