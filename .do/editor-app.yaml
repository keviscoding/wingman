# DigitalOcean App Platform spec for the Muzo editor tool.
#
# This is a SEPARATE app from the main Muzo backend — keeps blast
# radius tight. If Chromium OOMs or an editor floods the generator,
# the main app serving mobile users is unaffected.
#
# Deploy by pointing `doctl apps create --spec .do/editor-app.yaml`
# at your repo, or import this file via the DO UI → Apps → Create.

name: muzo-editor
region: nyc
services:
  - name: web
    source_dir: /
    dockerfile_path: marketing/Dockerfile
    github:
      repo: keviscoding/wingman
      branch: main
      deploy_on_push: true
    http_port: 8080
    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 30
      failure_threshold: 5
    instance_count: 1
    # xs instance is fine — Chromium is the RAM hog but we only
    # render one video at a time (single worker).  If editors report
    # slow runs we bump to s.
    instance_size_slug: basic-xs
    envs:
      # Shared bearer token that gates the UI. Editors open
      # https://<app-url>/?token=<value> to bypass the 401.
      # Generate with `openssl rand -base64 24`.
      - key: MUZO_EDITOR_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: CHANGE_ME_RUN_openssl_rand_-base64_24
      # Gemini keys for script generation — same ones the main Muzo
      # backend uses, comma separated. Rotate periodically.
      - key: GEMINI_API_KEYS
        scope: RUN_TIME
        type: SECRET
        value: CHANGE_ME_paste_comma_separated_keys
